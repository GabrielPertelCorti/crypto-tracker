<svg width="420" height="80" viewBox="0 0 420 80" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="gradCrypto" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#30DAFF"></stop>
      <stop offset="100%" stop-color="#3083FF"></stop>
    </linearGradient>
  </defs>

  <!-- Ícone de moeda -->
  <circle cx="40" cy="40" r="26" fill="url(#gradCrypto)" opacity="0.2"></circle>
  <circle cx="40" cy="40" r="18" stroke="url(#gradCrypto)" stroke-width="4" fill="none"></circle>

  <!-- Símbolo C de crypto -->
  <text x="31" y="48" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="url(#gradCrypto)">
    C
  </text>

  <!-- Nome do site -->
  <text x="80" y="50" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="url(#gradCrypto)">
    CryptoTracker
